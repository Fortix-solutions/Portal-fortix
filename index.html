<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Portal Fortix Solutions</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.4.0/dist/tabler-icons.min.css"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"><\/script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f0f0ee;--card:#fff;--border:#e2e0d8;--text:#1a1a18;--text2:#5a5a58;--blue:#185FA5;--blu:#E6F1FB;--amber:#BA7517;--ambl:#FAEEDA;--green:#2D7D3A;--grenl:#E6F4EA;--red:#C0392B;--redl:#FCEBEB;--r:12px;--sh:0 2px 12px rgba(0,0,0,0.08)}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);min-height:100vh;color:var(--text)}
/* LOGIN */
.lw{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.5rem}
.lc{background:var(--card);border-radius:var(--r);border:1px solid var(--border);padding:2.5rem 2rem;width:100%;max-width:400px;box-shadow:var(--sh)}
.ll{text-align:center;margin-bottom:1.5rem}.ll img{height:80px;width:auto}
.lt{font-size:20px;font-weight:600;text-align:center;margin-bottom:4px}
.ls{font-size:13px;color:var(--text2);text-align:center;margin-bottom:1.5rem}
.fi{display:flex;flex-direction:column;gap:4px;margin-bottom:12px}
.fi label{font-size:13px;font-weight:500;color:var(--text2)}
.fi input{font-size:14px;background:#f9f8f5;border:1px solid var(--border);border-radius:8px;padding:10px 12px;outline:none;font-family:inherit;width:100%}
.fi input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(24,95,165,.12);background:#fff}
.bp{width:100%;background:var(--blue);color:#fff;border:none;border-radius:8px;padding:11px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:4px}
.bp:hover{background:#0C447C}
.em{background:var(--redl);border:1px solid #F09595;border-radius:8px;padding:10px 12px;font-size:13px;color:var(--red);margin-top:10px;display:none}
/* PORTAL */
.pw{display:none;min-height:100vh;position:relative}
/* SIDEBAR */
.sb{position:fixed;top:0;left:0;width:240px;height:100vh;background:var(--card);border-right:1px solid var(--border);padding:1.25rem 1rem;display:flex;flex-direction:column;z-index:100;overflow-y:auto}
.sb-logo{text-align:center;margin-bottom:1.25rem;padding-bottom:1rem;border-bottom:1px solid var(--border)}
.sb-logo img{height:55px;width:auto}
.sb-user{display:flex;align-items:center;gap:10px;margin-bottom:1.25rem;padding:10px;background:var(--blu);border-radius:8px}
.sb-av{width:34px;height:34px;border-radius:50%;background:var(--blue);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0}
.sb-name{font-size:13px;font-weight:600;color:var(--blue)}
.sb-role{font-size:11px;color:var(--text2)}
.nav-sep{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#aaa;padding:10px 10px 4px}
.ni{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:500;color:var(--text2);margin-bottom:2px;transition:all .15s}
.ni:hover,.ni.active{background:var(--blu);color:var(--blue)}
.ni i{font-size:17px}
.nl{margin-top:auto;display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:8px;cursor:pointer;font-size:13px;color:var(--red);border:1px solid #F09595;background:var(--redl)}
/* MAIN */
.mn{margin-left:240px;padding:2rem;min-height:100vh}
.mh{display:none;align-items:center;gap:12px;padding:1rem;background:var(--card);border-bottom:1px solid var(--border);margin:-2rem -2rem 2rem}
.hb{font-size:24px;cursor:pointer}
.pt{font-size:22px;font-weight:700;margin-bottom:4px}
.ps{font-size:14px;color:var(--text2);margin-bottom:1.75rem}
/* STATS */
.sg{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:1.75rem}
.sc{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:1rem}
.si{font-size:22px;margin-bottom:6px}
.sl{font-size:11px;font-weight:500;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.sv{font-size:26px;font-weight:700}
/* CARD */
.cd{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:1.25rem;margin-bottom:1rem}
.ch{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
.ct{font-size:15px;font-weight:600}
.bs{padding:6px 14px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;border:1px solid var(--border);background:transparent;color:var(--text)}
.bs:hover{background:var(--bg)}
.bb{background:var(--blue);color:#fff;border-color:var(--blue)}
.bb:hover{background:#0C447C}
.ba{background:var(--amber);color:#fff;border-color:var(--amber)}
/* TABLE */
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text2);padding:7px 10px;border-bottom:1px solid var(--border)}
td{padding:9px 10px;border-bottom:1px solid #f0ede6;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg)}
.badge{display:inline-flex;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:500}
.bg2{background:var(--grenl);color:var(--green)}
.ba2{background:var(--ambl);color:var(--amber)}
.br2{background:var(--redl);color:var(--red)}
.bb2{background:var(--blu);color:var(--blue)}
/* PONTO */
.clk{font-size:40px;font-weight:700;color:var(--blue);text-align:center;letter-spacing:3px;margin:1rem 0 4px}
.cdt{font-size:13px;color:var(--text2);text-align:center;margin-bottom:1.25rem}
.pg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1rem}
.pb{display:flex;flex-direction:column;align-items:center;gap:5px;padding:12px;border-radius:8px;cursor:pointer;border:none;font-family:inherit;font-size:12px;font-weight:600;transition:.15s}
.pb i{font-size:22px}
.pbe{background:var(--green);color:#fff}
.pbip{background:var(--amber);color:#fff}
.pbfp{background:var(--blue);color:#fff}
.pbs{background:var(--red);color:#fff}
.tb{background:var(--grenl);border:1px solid var(--border);border-radius:8px;padding:10px 14px;display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem}
/* RECIBOS */
.ri{border:1px solid var(--border);border-radius:8px;padding:10px 14px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
.rec-doc{background:#f9f8f5;border:1px solid var(--border);border-radius:8px;padding:1rem;margin-bottom:1rem}
.step-row{display:flex;align-items:center;gap:6px;margin-bottom:1rem;font-size:12px;color:var(--text2)}
.sd{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0}
.sdone{background:var(--grenl);color:var(--green)}
.sact{background:var(--blu);color:var(--blue)}
.spend{background:#eee;color:#aaa}
.sl2{width:20px;height:1px;background:var(--border)}
canvas{border:1px solid var(--border);border-radius:8px;cursor:crosshair;display:block;width:100%;background:#fff}
/* FICHA */
.fsec{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--text2);padding:6px 10px;border-bottom:1px solid var(--border);margin-bottom:4px;display:flex;align-items:center;gap:6px}
.fr{display:flex;padding:6px 10px;font-size:13px;border-bottom:1px solid #f5f4f0}
.fr:last-child{border-bottom:none}
.fl{color:var(--text2);width:160px;flex-shrink:0;font-weight:500}
.fv{color:var(--text)}
/* FORM */
.fg{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fi2{display:flex;flex-direction:column;gap:4px}
.fi2 label{font-size:12px;font-weight:500;color:var(--text2)}
.fi2 input,.fi2 select,.fi2 textarea{font-size:13px;background:#f9f8f5;border:1px solid var(--border);border-radius:8px;padding:8px 10px;font-family:inherit;outline:none;width:100%}
.fi2 input:focus,.fi2 select:focus{border-color:var(--blue)}
/* MODAL */
.mo{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:999;display:none;align-items:center;justify-content:center}
.mb{background:var(--card);border-radius:var(--r);padding:2rem;max-width:440px;width:90%}
.mt{font-size:17px;font-weight:600;margin-bottom:1rem}
.mbt{display:flex;gap:8px;justify-content:flex-end;margin-top:1rem}
/* MISC */
.hidden{display:none!important}
.info{background:var(--blu);border:1px solid #B5D4F4;border-radius:8px;padding:10px 14px;font-size:13px;color:var(--blue);margin-bottom:1rem}
.ok-box{background:var(--grenl);border:1px solid var(--border);border-radius:8px;padding:10px 14px;display:flex;align-items:center;gap:10px}
@media(max-width:768px){.sb{transform:translateX(-100%);transition:.3s}.sb.open{transform:translateX(0)}.mn{margin-left:0}.mh{display:flex}}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="lw" id="loginWrap">
  <div class="lc">
    <div class="ll"><div style="font-size:20px;font-weight:900;color:#185FA5;letter-spacing:-1px;">FORTIX<span style="color:#BA7517;">.</span></div></div>
    <div class="lt">Portal do Colaborador</div>
    <div class="ls">Aceda com o seu NIF e senha</div>
    <div class="fi"><label>NIF</label><input type="text" id="lNif" placeholder="123456789" maxlength="9"/></div>
    <div class="fi"><label>Senha</label><input type="password" id="lPwd" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"/></div>
    <button class="bp" onclick="doLogin()">Entrar</button>
    <div class="em" id="lErr">NIF ou senha incorretos.</div>
  </div>
</div>

<!-- PORTAL -->
<div class="pw" id="portalWrap">

  <!-- SIDEBAR -->
  <div class="sb" id="sidebar">
    <div class="sb-logo"><div style="font-size:20px;font-weight:900;color:#185FA5;letter-spacing:-1px;">FORTIX<span style="color:#BA7517;">.</span></div></div>
    <div class="sb-user">

      <div class="ni" id="n-adocs" onclick="showP('adocs')"><i class="ti ti-file-plus"></i> Publicar documentos</div>
    </div>
    <div class="nl" onclick="doLogout()"><i class="ti ti-logout"></i> Sair</div>
  </div>

  <!-- MAIN -->
  <div class="mn" id="mainArea">
    <div class="mh"><span class="hb" onclick="document.getElementById('sidebar').classList.toggle('open')"><i class="ti ti-menu-2"></i></span><div style="font-size:20px;font-weight:900;color:#185FA5;letter-spacing:-1px;">FORTIX<span style="color:#BA7517;">.</span></div></div>

    <!-- DASHBOARD -->
    <div id="p-dash">

      <div class="ps" id="dashSub">Portal Fortix Solutions</div>

        <div class="sc"><div class="si">📄</div><div class="sl">Recibos</div><div class="sv" id="stRecibos">—</div></div>
        <div class="sc"><div class="si">📁</div><div class="sl">Documentos</div><div class="sv" id="stDocs">—</div></div>
        <div class="sc"><div class="si">✅</div><div class="sl">Estado</div><div class="sv"><span class="badge bg2">Ativo</span></div></div>
      </div>
      <div class="cd">
        <div class="ch"><div class="ct">Últimos registos de ponto</div><button class="bs bb" onclick="showP('ponto')">Ver todos</button></div>
        <div id="dashPonto"><p style="color:var(--text2);font-size:13px;text-align:center;padding:1rem">Sem registos recentes</p></div>
      </div>
    </div>

    <!-- PONTO -->
    <div id="p-ponto" class="hidden">
      <div class="pt">Folha de ponto</div>
      <div class="ps">Registe entradas, pausas e saídas</div>
      <div class="cd">
        <div class="clk" id="clkDisp">--:--:--</div>
        <div class="cdt" id="clkDate">—</div>
        <div class="pg">
          <button class="pb pbe" onclick="regP('entrada')"><i class="ti ti-login"></i>Entrada</button>
          <button class="pb pbip" onclick="regP('inicio_pausa')"><i class="ti ti-coffee"></i>Início pausa</button>
          <button class="pb pbfp" onclick="regP('fim_pausa')"><i class="ti ti-player-play"></i>Fim pausa</button>
          <button class="pb pbs" onclick="regP('saida')"><i class="ti ti-logout"></i>Saída</button>
        </div>
        <div id="pMsg" style="text-align:center;font-size:13px;font-weight:500;min-height:18px;margin-bottom:8px;color:var(--green)"></div>

          <div style="font-size:13px;color:var(--green);font-weight:500"><i class="ti ti-clock"></i> Total de horas hoje</div>
          <div style="font-size:20px;font-weight:700;color:var(--green)" id="totHoje">—</div>
        </div>
      </div>
      <div class="cd">
        <div class="ch"><div class="ct">Histórico de ponto</div></div>
        <div id="pontoHist"><p style="color:var(--text2);font-size:13px;text-align:center;padding:1rem">Sem registos</p></div>
      </div>
    </div>

    <!-- RECIBOS -->
    <div id="p-recibos" class="hidden">
      <div id="recLista">
        <div class="pt">Recibos de vencimento</div>
        <div class="ps">Visualize e assine os seus recibos mensais</div>

        <div class="cd"><div id="recibosLista"><p style="color:var(--text2);font-size:13px;text-align:center;padding:1rem">Sem recibos</p></div></div>
      </div>
      <div id="recViewer" class="hidden">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:1rem">
          <button class="bs" onclick="showRecLista()"><i class="ti ti-arrow-left"></i> Voltar</button>
          <div class="pt" style="margin:0" id="recViewTitle">Recibo</div>
        </div>
        <div class="step-row">
          <div class="sd sact" id="rs1">1</div><span>Visualizar</span>
          <div class="sl2"></div>
          <div class="sd spend" id="rs2">2</div><span>Assinar</span>
          <div class="sl2"></div>
          <div class="sd spend" id="rs3"><i class="ti ti-check" style="font-size:9px"></i></div><span>Concluído</span>
        </div>
        <div class="cd">
          <div class="rec-doc" id="recDocContent"></div>
          <div id="recBtnConfirmar" style="text-align:center;margin-bott
